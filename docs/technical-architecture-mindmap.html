<!doctype html>

  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: Inter, "Microsoft YaHei", "Noto Sans SC", "Noto Sans JP", sans-serif;
      color: #172554;
      background:
        radial-gradient(circle at 50% 48%, rgba(219, 234, 254, .9), transparent 26%),
        linear-gradient(135deg, #f8fbff, #fff7fb);
    }
    .toolbar {
      position: fixed;
      z-index: 20;
      top: 14px;
      left: 50%;
      display: flex;
      align-items: center;
      gap: 8px;
      transform: translateX(-50%);
      padding: 8px;
      border: 1px solid #dbeafe;
      border-radius: 12px;
      background: rgba(255,255,255,.92);
      box-shadow: 0 8px 24px rgba(30,64,175,.12);
      backdrop-filter: blur(12px);
    }
    .toolbar span { padding: 0 8px; font-size: 13px; color: #64748b; }
    button {
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 7px 11px;
      color: #1d4ed8;
      background: white;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #eff6ff; }
    #viewport {
      width: 100%;
      height: 100%;
      cursor: grab;
      user-select: none;
    }
    #viewport.dragging { cursor: grabbing; }
    svg { width: 100%; height: 100%; }
    .edge {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
      opacity: .72;
    }
    .edge.sub { stroke-width: 2; opacity: .48; }
    .node rect {
      stroke-width: 2;
      filter: drop-shadow(0 5px 8px rgba(30,64,175,.11));
    }
    .node text {
      dominant-baseline: middle;
      text-anchor: middle;
      font-weight: 700;
      pointer-events: none;
    }
    .root rect { fill: url(#rootGradient); stroke: #7c3aed; stroke-width: 3; }
    .root text { fill: white; font-size: 24px; }
    .main text { fill: white; font-size: 17px; }
    .leaf rect { fill: rgba(255,255,255,.96); }
    .leaf text { fill: #334155; font-size: 13px; }
    .small text { font-size: 12px; }
    .caption {
      position: fixed;
      left: 18px;
      bottom: 16px;
      color: #64748b;
      font-size: 12px;
    }
    @media print {
      .toolbar, .caption { display: none; }
      body { overflow: visible; background: white; }
      #viewport { width: 1600px; height: 1000px; }
    }
  </style>

  <div class="caption">AI Japanese Learning Platform · Technical Architecture Mind Map</div>

  <script>
    const viewport = document.getElementById("viewport");
    const canvas = document.getElementById("canvas");
    let scale = 0.82;
    let tx = 160;
    let ty = 70;
    let dragging = false;
    let lastX = 0;
    let lastY = 0;

    function render() {
      canvas.setAttribute("transform", `translate(${tx} ${ty}) scale(${scale})`);
    }
    function zoomBy(factor, cx = innerWidth / 2, cy = innerHeight / 2) {
      const next = Math.min(1.8, Math.max(0.45, scale * factor));
      tx = cx - (cx - tx) * (next / scale);
      ty = cy - (cy - ty) * (next / scale);
      scale = next;
      render();
    }
    function resetView() {
      scale = 0.82;
      tx = Math.max(20, (innerWidth - 1800 * scale) / 2);
      ty = 55;
      render();
    }
    viewport.addEventListener("wheel", (event) => {
      event.preventDefault();
      zoomBy(event.deltaY < 0 ? 1.1 : 0.9, event.clientX, event.clientY);
    }, { passive: false });
    viewport.addEventListener("pointerdown", (event) => {
      dragging = true;
      lastX = event.clientX;
      lastY = event.clientY;
      viewport.classList.add("dragging");
      viewport.setPointerCapture(event.pointerId);
    });
    viewport.addEventListener("pointermove", (event) => {
      if (!dragging) return;
      tx += event.clientX - lastX;
      ty += event.clientY - lastY;
      lastX = event.clientX;
      lastY = event.clientY;
      render();
    });
    viewport.addEventListener("pointerup", () => {
      dragging = false;
      viewport.classList.remove("dragging");
    });
    resetView();
  </script>
