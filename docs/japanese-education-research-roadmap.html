<script>
const v=document.getElementById("viewport"),c=document.getElementById("canvas");let s=.64,x=0,y=8,d=false,lx=0,ly=0;
function draw(){c.setAttribute("transform",`translate(${x} ${y}) scale(${s})`)}
function zoomBy(f,cx=innerWidth/2,cy=innerHeight/2){const n=Math.min(1.8,Math.max(.36,s*f));x=cx-(cx-x)*(n/s);y=cy-(cy-y)*(n/s);s=n;draw()}
function resetView(){s=.64;x=Math.max(10,(innerWidth-2400*s)/2);y=8;draw()}
v.addEventListener("wheel",e=>{e.preventDefault();zoomBy(e.deltaY<0?1.1:.9,e.clientX,e.clientY)},{passive:false});
v.addEventListener("pointerdown",e=>{d=true;lx=e.clientX;ly=e.clientY;v.classList.add("dragging");v.setPointerCapture(e.pointerId)});
v.addEventListener("pointermove",e=>{if(!d)return;x+=e.clientX-lx;y+=e.clientY-ly;lx=e.clientX;ly=e.clientY;draw()});
v.addEventListener("pointerup",()=>{d=false;v.classList.remove("dragging")});resetView();
</script>
