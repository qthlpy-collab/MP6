<script>
const v=document.getElementById("viewport"),c=document.getElementById("canvas");let s=.73,x=0,y=18,d=false,lx=0,ly=0;
function draw(){c.setAttribute("transform",`translate(${x} ${y}) scale(${s})`)}
function zoom(f,cx=innerWidth/2,cy=innerHeight/2){const n=Math.min(1.8,Math.max(.4,s*f));x=cx-(cx-x)*(n/s);y=cy-(cy-y)*(n/s);s=n;draw()}
function reset(){s=.73;x=Math.max(10,(innerWidth-1900*s)/2);y=18;draw()}
v.addEventListener("wheel",e=>{e.preventDefault();zoom(e.deltaY<0?1.1:.9,e.clientX,e.clientY)},{passive:false});
v.addEventListener("pointerdown",e=>{d=true;lx=e.clientX;ly=e.clientY;v.classList.add("dragging");v.setPointerCapture(e.pointerId)});
v.addEventListener("pointermove",e=>{if(!d)return;x+=e.clientX-lx;y+=e.clientY-ly;lx=e.clientX;ly=e.clientY;draw()});
v.addEventListener("pointerup",()=>{d=false;v.classList.remove("dragging")});reset();
</script>
